services:
  api-gateway-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  customer-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: customer_service
      POSTGRES_USER: karrygo
      POSTGRES_PASSWORD: karrygo
    ports:
      - "5433:5432"
    volumes:
      - customer_postgres_data:/var/lib/postgresql/data

  customer-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  taxi-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taxi_service
      POSTGRES_USER: karrygo
      POSTGRES_PASSWORD: karrygo
    ports:
      - "5434:5432"
    volumes:
      - taxi_postgres_data:/var/lib/postgresql/data

  taxi-redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"

  driver-dispatch-delivery-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dispatch_delivery_service
      POSTGRES_USER: karrygo
      POSTGRES_PASSWORD: karrygo
    ports:
      - "5435:5432"
    volumes:
      - dispatch_delivery_postgres_data:/var/lib/postgresql/data
      - ../services/driver-dispatch-delivery-service/migrations/001_dispatch_rider_auth.sql:/docker-entrypoint-initdb.d/001_dispatch_rider_auth.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/002_dispatch_rider_auth_alter.sql:/docker-entrypoint-initdb.d/002_dispatch_rider_auth_alter.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000004_create_providers.up.sql:/docker-entrypoint-initdb.d/000004_create_providers.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000005_create_emergency_contacts.up.sql:/docker-entrypoint-initdb.d/000005_create_emergency_contacts.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000006_create_guarantors.up.sql:/docker-entrypoint-initdb.d/000006_create_guarantors.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000007_create_ratings.up.sql:/docker-entrypoint-initdb.d/000007_create_ratings.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000008_create_verification_steps.up.sql:/docker-entrypoint-initdb.d/000008_create_verification_steps.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000009_create_verification_documents.up.sql:/docker-entrypoint-initdb.d/000009_create_verification_documents.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000010_create_face_checks.up.sql:/docker-entrypoint-initdb.d/000010_create_face_checks.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000011_create_verification_audit.up.sql:/docker-entrypoint-initdb.d/000011_create_verification_audit.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000012_expand_verification_audit_actions.up.sql:/docker-entrypoint-initdb.d/000012_expand_verification_audit_actions.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000013_add_fully_approved_audit.up.sql:/docker-entrypoint-initdb.d/000013_add_fully_approved_audit.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000014_create_bikes.up.sql:/docker-entrypoint-initdb.d/000014_create_bikes.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000015_create_bike_documents.up.sql:/docker-entrypoint-initdb.d/000015_create_bike_documents.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000016_create_bike_audit.up.sql:/docker-entrypoint-initdb.d/000016_create_bike_audit.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000017_create_provider_availability.up.sql:/docker-entrypoint-initdb.d/000017_create_provider_availability.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000018_create_availability_sessions.up.sql:/docker-entrypoint-initdb.d/000018_create_availability_sessions.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000019_create_request_broadcasts.up.sql:/docker-entrypoint-initdb.d/000019_create_request_broadcasts.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000020_create_provider_request_inbox.up.sql:/docker-entrypoint-initdb.d/000020_create_provider_request_inbox.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000021_create_trips.up.sql:/docker-entrypoint-initdb.d/000021_create_trips.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000022_create_trip_state_log.up.sql:/docker-entrypoint-initdb.d/000022_create_trip_state_log.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000023_create_delivery_proofs.up.sql:/docker-entrypoint-initdb.d/000023_create_delivery_proofs.sql:ro
      - ../services/driver-dispatch-delivery-service/migrations/000024_create_cancellations.up.sql:/docker-entrypoint-initdb.d/000024_create_cancellations.sql:ro

  driver-dispatch-delivery-redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"

  hauling-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hauling_service
      POSTGRES_USER: karrygo
      POSTGRES_PASSWORD: karrygo
    ports:
      - "5436:5432"
    volumes:
      - hauling_postgres_data:/var/lib/postgresql/data

  hauling-redis:
    image: redis:7-alpine
    ports:
      - "6383:6379"

  payment-wallet-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_wallet_service
      POSTGRES_USER: karrygo
      POSTGRES_PASSWORD: karrygo
    ports:
      - "5437:5432"
    volumes:
      - payment_wallet_postgres_data:/var/lib/postgresql/data

  payment-wallet-redis:
    image: redis:7-alpine
    ports:
      - "6384:6379"

  notification-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_service
      POSTGRES_USER: karrygo
      POSTGRES_PASSWORD: karrygo
    ports:
      - "5438:5432"
    volumes:
      - notification_postgres_data:/var/lib/postgresql/data

  notification-redis:
    image: redis:7-alpine
    ports:
      - "6385:6379"

  support-dispute-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: support_dispute_service
      POSTGRES_USER: karrygo
      POSTGRES_PASSWORD: karrygo
    ports:
      - "5439:5432"
    volumes:
      - support_dispute_postgres_data:/var/lib/postgresql/data

  verification-compliance-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: verification_compliance_service
      POSTGRES_USER: karrygo
      POSTGRES_PASSWORD: karrygo
    ports:
      - "5440:5432"
    volumes:
      - verification_compliance_postgres_data:/var/lib/postgresql/data

  media-file-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: media_file_service
      POSTGRES_USER: karrygo
      POSTGRES_PASSWORD: karrygo
    ports:
      - "5441:5432"
    volumes:
      - media_file_postgres_data:/var/lib/postgresql/data

  admin-backoffice-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: admin_backoffice_service
      POSTGRES_USER: karrygo
      POSTGRES_PASSWORD: karrygo
    ports:
      - "5442:5432"
    volumes:
      - admin_backoffice_postgres_data:/var/lib/postgresql/data

  admin-backoffice-redis:
    image: redis:7-alpine
    ports:
      - "6386:6379"

  analytics-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analytics_service
      POSTGRES_USER: karrygo
      POSTGRES_PASSWORD: karrygo
    ports:
      - "5443:5432"
    volumes:
      - analytics_postgres_data:/var/lib/postgresql/data

  api-gateway:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE_DIR: api-gateway
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      API_GATEWAY_REDIS_ADDR: api-gateway-redis:6379
    depends_on:
      - api-gateway-redis
    ports:
      - "8080:8080"

  customer-service:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE_DIR: customer-service
    environment:
      APP_ENV: development
      HTTP_ADDR: :8101
      CUSTOMER_DATABASE_URL: postgres://karrygo:karrygo@customer-postgres:5432/customer_service?sslmode=disable
      CUSTOMER_REDIS_ADDR: customer-redis:6379
      CUSTOMER_ACCESS_TOKEN_SECRET: development-customer-access-token-secret
      CUSTOMER_REFRESH_TOKEN_SECRET: development-customer-refresh-token-secret
      CUSTOMER_OTP_SECRET: development-customer-otp-secret
      CUSTOMER_DEBUG_OTP: "true"
    depends_on:
      - customer-postgres
      - customer-redis
    ports:
      - "8101:8101"

  taxi-service:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE_DIR: taxi-service
    environment:
      APP_ENV: development
      HTTP_ADDR: :8102
      TAXI_DATABASE_URL: postgres://karrygo:karrygo@taxi-postgres:5432/taxi_service?sslmode=disable
      TAXI_REDIS_ADDR: taxi-redis:6379
    depends_on:
      - taxi-postgres
      - taxi-redis
    ports:
      - "8102:8102"

  driver-dispatch-delivery-service:
    build:
      context: ..
      dockerfile: services/driver-dispatch-delivery-service/Dockerfile
    environment:
      APP_ENV: development
      GIN_MODE: debug
      SERVICE_NAME: driver-dispatch-delivery-service
      HTTP_ADDR: :8103
      DISPATCH_DELIVERY_DATABASE_URL: postgres://karrygo:karrygo@driver-dispatch-delivery-postgres:5432/dispatch_delivery_service?sslmode=disable
      DISPATCH_DELIVERY_REDIS_ADDR: driver-dispatch-delivery-redis:6379
      DISPATCH_DELIVERY_INTERNAL_SERVICE_KEY: development-internal-service-key
      AVAILABILITY_SERVICE_URL: http://localhost:8103
      BROADCAST_INITIAL_RADIUS_KM: "5.0"
      BROADCAST_RADIUS_INCREMENT_KM: "3.0"
      BROADCAST_MAX_ATTEMPTS: "3"
      BROADCAST_WINDOW_SECONDS: "30"
      DISPATCH_RIDER_ACCESS_TOKEN_SECRET: development-dispatch-rider-access-token-secret
      DISPATCH_RIDER_REFRESH_TOKEN_SECRET: development-dispatch-rider-refresh-token-secret
      DISPATCH_RIDER_OTP_SECRET: development-dispatch-rider-otp-secret
      DISPATCH_RIDER_DEBUG_OTP: "true"
      VERIFICATION_STORAGE_MODE: local_private
      VERIFICATION_UPLOAD_ROOT: /app/uploads
      SMILE_IDENTITY_FAKE_MODE: pass
    depends_on:
      - driver-dispatch-delivery-postgres
      - driver-dispatch-delivery-redis
    volumes:
      - ../tmp/karrygo-uploads:/app/uploads
    ports:
      - "8103:8103"

  hauling-service:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE_DIR: hauling-service
    environment:
      APP_ENV: development
      HTTP_ADDR: :8104
      HAULING_DATABASE_URL: postgres://karrygo:karrygo@hauling-postgres:5432/hauling_service?sslmode=disable
      HAULING_REDIS_ADDR: hauling-redis:6379
    depends_on:
      - hauling-postgres
      - hauling-redis
    ports:
      - "8104:8104"

  payment-wallet-service:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE_DIR: payment-wallet-service
    environment:
      APP_ENV: development
      HTTP_ADDR: :8105
      PAYMENT_WALLET_DATABASE_URL: postgres://karrygo:karrygo@payment-wallet-postgres:5432/payment_wallet_service?sslmode=disable
      PAYMENT_WALLET_REDIS_ADDR: payment-wallet-redis:6379
    depends_on:
      - payment-wallet-postgres
      - payment-wallet-redis
    ports:
      - "8105:8105"

  notification-service:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE_DIR: notification-service
    environment:
      APP_ENV: development
      HTTP_ADDR: :8106
      NOTIFICATION_DATABASE_URL: postgres://karrygo:karrygo@notification-postgres:5432/notification_service?sslmode=disable
      NOTIFICATION_REDIS_ADDR: notification-redis:6379
    depends_on:
      - notification-postgres
      - notification-redis
    ports:
      - "8106:8106"

  support-dispute-service:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE_DIR: support-dispute-service
    environment:
      APP_ENV: development
      HTTP_ADDR: :8107
      SUPPORT_DISPUTE_DATABASE_URL: postgres://karrygo:karrygo@support-dispute-postgres:5432/support_dispute_service?sslmode=disable
    depends_on:
      - support-dispute-postgres
    ports:
      - "8107:8107"

  verification-compliance-service:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE_DIR: verification-compliance-service
    environment:
      APP_ENV: development
      HTTP_ADDR: :8108
      VERIFICATION_COMPLIANCE_DATABASE_URL: postgres://karrygo:karrygo@verification-compliance-postgres:5432/verification_compliance_service?sslmode=disable
    depends_on:
      - verification-compliance-postgres
    ports:
      - "8108:8108"

  media-file-service:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE_DIR: media-file-service
    environment:
      APP_ENV: development
      HTTP_ADDR: :8109
      MEDIA_FILE_DATABASE_URL: postgres://karrygo:karrygo@media-file-postgres:5432/media_file_service?sslmode=disable
    depends_on:
      - media-file-postgres
    ports:
      - "8109:8109"

  admin-backoffice-service:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE_DIR: admin-backoffice-service
    environment:
      APP_ENV: development
      HTTP_ADDR: :8110
      ADMIN_BACKOFFICE_DATABASE_URL: postgres://karrygo:karrygo@admin-backoffice-postgres:5432/admin_backoffice_service?sslmode=disable
      ADMIN_BACKOFFICE_REDIS_ADDR: admin-backoffice-redis:6379
    depends_on:
      - admin-backoffice-postgres
      - admin-backoffice-redis
    ports:
      - "8110:8110"

  analytics-service:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE_DIR: analytics-service
    environment:
      APP_ENV: development
      HTTP_ADDR: :8111
      ANALYTICS_DATABASE_URL: postgres://karrygo:karrygo@analytics-postgres:5432/analytics_service?sslmode=disable
    depends_on:
      - analytics-postgres
    ports:
      - "8111:8111"

volumes:
  customer_postgres_data:
  taxi_postgres_data:
  dispatch_delivery_postgres_data:
  hauling_postgres_data:
  payment_wallet_postgres_data:
  notification_postgres_data:
  support_dispute_postgres_data:
  verification_compliance_postgres_data:
  media_file_postgres_data:
  admin_backoffice_postgres_data:
  analytics_postgres_data:
